name: Review Submission

on:
  issues:
    types:
      - opened
      - edited
      - labeled

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: review-submission-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  create-review-pr:
    if: >
      contains(github.event.issue.labels.*.name, 'review-submission') &&
      (github.event.action != 'labeled' || github.event.label.name == 'review-submission')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Prepare branch
        id: branch
        run: |
          branch="review-submission/issue-${{ github.event.issue.number }}"
          git fetch origin main
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch" origin/main
          echo "name=$branch" >> "$GITHUB_OUTPUT"

      - name: Convert Issue to YAML
        id: convert
        run: |
          python scripts/issue_to_program.py \
            --event "$GITHUB_EVENT_PATH" \
            --github-output "$GITHUB_OUTPUT" \
            --report conversion-report.md

      - name: Validate generated data
        env:
          BBREP_PR_AUTHOR: ${{ github.event.issue.user.login }}
          BBREP_BASE_REF: origin/main
        run: |
          python scripts/validate.py --report validation-report.md
          python scripts/build_markdown.py

      - name: Commit generated review
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/programs docs/stats.md docs/reviews.md
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Add review submission from issue #${{ github.event.issue.number }}"
          git push --force-with-lease origin "${{ steps.branch.outputs.name }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update Pull Request
        id: pr
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="${{ steps.branch.outputs.name }}"
          title="Review submission: ${{ steps.convert.outputs.program_name }}"
          body="$(cat <<EOF
          Generated from #${{ github.event.issue.number }}.

          Program path: \`${{ steps.convert.outputs.program_path }}\`

          Maintainers should review the Issue content and generated YAML before merging.

          Closes #${{ github.event.issue.number }}.
          EOF
          )"
          pr_number="$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$title" --body "$body"
          else
            gh pr create --base main --head "$branch" --title "$title" --body "$body"
            pr_number="$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number // ""')"
          fi
          if [ -n "$pr_number" ]; then
            pr_url="$(gh pr view "$pr_number" --json url --jq .url)"
            echo "url=$pr_url" >> "$GITHUB_OUTPUT"
            echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on Issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          marker="<!-- bbrep-review-submission-report -->"
          validation_status="failed"
          if grep -q "^Status: PASS" validation-report.md 2>/dev/null; then
            validation_status="passed"
          fi
          {
            echo "$marker"
            echo
            cat conversion-report.md 2>/dev/null || true
            echo
            echo "Validation: $validation_status"
            if [ -n "${{ steps.pr.outputs.number }}" ]; then
              echo
              echo "Pull request: #${{ steps.pr.outputs.number }}"
            fi
            echo
            echo "Detailed validation output is available in the workflow run."
          } > issue-comment.md
          comment_id="$(
            gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
              --paginate \
              --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"$marker\"))) | .id" \
              | head -n 1
          )"
          if [ -n "$comment_id" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/$comment_id" \
              -f body="$(cat issue-comment.md)" \
              >/dev/null
          else
            gh issue comment "${{ github.event.issue.number }}" --body-file issue-comment.md
          fi
