name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Validate data
        shell: bash
        env:
          BBREP_PR_AUTHOR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login || '' }}
          BBREP_BASE_REF: origin/${{ github.base_ref || 'main' }}
          BBREP_ALLOW_GENERATED_REVIEW_SUBMISSION: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'github-actions[bot]' && startsWith(github.head_ref, 'review-submission/issue-') }}
        run: |
          set +e
          python scripts/validate.py --report validation-report.md
          status=$?
          cat validation-report.md >> "$GITHUB_STEP_SUMMARY"
          exit $status

      - name: Check Markdown snapshots
        shell: bash
        run: |
          python scripts/build_markdown.py
          git diff --exit-code -- docs/stats.md docs/reviews.md

      - name: Build site
        run: npm run build

      - name: Comment validation report
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- bbrep-pr-validation-report -->';
            const report = fs.existsSync('validation-report.md')
              ? fs.readFileSync('validation-report.md', 'utf8')
              : '# bbrep validation report\n\nValidation did not produce a report.';
            const compact = report
              .replace(/\n## Checked URLs\n(?:- .+\n?)+/m, '\n')
              .trim();
            const body = `${marker}\n\n${compact}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
